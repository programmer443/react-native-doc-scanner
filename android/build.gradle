buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.5.0"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
// Generated by `pnpm --filter react-native-doc-scanner run specs` (tsc && nitrogen) —
// must be run at least once before these resolve.
apply from: "../nitrogen/generated/android/DocScanner+autolinking.gradle"
apply from: "./fix-prefab.gradle"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name, defaultValue) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : defaultValue
}

android {
  namespace "com.margelo.nitro.docscanner"
  ndkVersion getExtOrDefault("ndkVersion", "27.1.12297006")
  compileSdkVersion getExtOrDefault("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion", 24)
    targetSdkVersion getExtOrDefault("targetSdkVersion", 35)
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -Wextra -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared"
        abiFilters (*reactNativeArchitectures())
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    prefab true
    buildConfig true
  }

  prefab {
    DocScanner {
      headers "${project.buildDir}/headers/docscanner/"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main {
      if (isNewArchitectureEnabled()) {
        java.srcDirs += ["${project.buildDir}/generated/source/codegen/java"]
      }
      // The ONNX/charset model files fetched by `scripts/fetch-models.sh` (or copied per
      // docs/MODEL_TRAINING.md) live in the package-level `assets/models/` directory, shared
      // with the iOS podspec's `s.resources`. Point this module's Android asset sourceSet at
      // it directly instead of duplicating the files under android/src/main/assets — resolved
      // at runtime via `bundle://<filename>` -> `context.assets.open("models/<filename>")`
      // (see ModelPathResolver.kt).
      assets.srcDirs += ["../assets"]
    }
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.24"

  implementation project(":react-native-nitro-modules")
  // For the `Frame` HybridObject type referenced in DocScanner.nitro.ts.
  implementation project(":react-native-vision-camera")

  // Official Microsoft ONNX Runtime Android build — NOT the
  // `onnxruntime-react-native` npm package; see docs/TROUBLESHOOTING.md for
  // why per-frame inference runs through this native AAR directly instead.
  implementation "com.microsoft.onnxruntime:onnxruntime-android:1.19.2"

  // Official OpenCV Android SDK, published to Maven Central since v4.9.0.
  implementation "org.opencv:opencv:4.9.0"
}

tasks.register('prepareHeaders', Copy) {
  from fileTree('./src/main/cpp').filter { it.isFile() }
  from fileTree('../cpp/').filter { it.isFile() }
  from fileTree('../nitrogen/generated/android/c++').filter { it.isFile() }
  from fileTree('../nitrogen/generated/shared/c++').filter { it.isFile() }
  include "*.hpp"
  into "${project.buildDir}/headers/docscanner/DocScanner/"
  includeEmptyDirs = false
}

preBuild.dependsOn(prepareHeaders)
